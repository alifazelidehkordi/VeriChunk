name: Refresh uv lockfile

on:
  push:
    branches:
      - phase-5-release-agents

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: phase-5-release-agents
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Refresh lockfile from public PyPI
        run: uv lock --default-index https://pypi.org/simple
      - name: Verify portable and Python 3.10-compatible lock
        run: |
          ! grep -q 'applied-caas-gateway1.internal.api.openai.org' uv.lock
          grep -q 'onnxruntime-1.23.2' uv.lock
      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "build: refresh public uv lockfile"
          git push origin HEAD:phase-5-release-agents
