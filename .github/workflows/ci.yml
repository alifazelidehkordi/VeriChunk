name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --frozen --extra dev
      - name: Run Python tests
        run: uv run pytest -q

  quality-build:
    name: Quality and distributions
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install locked development and provider dependencies
        run: uv sync --frozen --extra dev --extra agents
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src/doc_splitter
      - name: Golden corpus audit
        run: uv run python scripts/audit-golden-corpus.py --output /tmp/golden-results.json
      - name: Build wheel and source distribution
        run: uv build
      - name: Smoke install built wheel
        run: |
          uv venv /tmp/verichunk-wheel --python 3.13
          uv pip install --python /tmp/verichunk-wheel/bin/python dist/*.whl
          /tmp/verichunk-wheel/bin/verichunk --help >/dev/null
          /tmp/verichunk-wheel/bin/doc-splitter --help >/dev/null

  node-tests:
    name: Node MCP
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: node --check server.js
      - run: npm pack --dry-run
