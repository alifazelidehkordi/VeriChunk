name: Normalize uv lockfile

on:
  push:
    branches:
      - phase-5-release-agents

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: phase-5-release-agents
          fetch-depth: 0
      - name: Rewrite private mirror URLs to public PyPI
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("uv.lock")
          content = path.read_text(encoding="utf-8")
          private = (
              "https://packages.applied-caas-gateway1.internal.api.openai.org/"
              "artifactory/api/pypi/pypi-public"
          )
          content = content.replace(private + "/simple", "https://pypi.org/simple")
          content = content.replace(
              private + "/packages/packages/",
              "https://files.pythonhosted.org/packages/",
          )
          if "applied-caas-gateway1.internal.api.openai.org" in content:
              raise SystemExit("private package index remains in uv.lock")
          path.write_text(content, encoding="utf-8")
          PY
      - name: Commit normalized lockfile
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock is already portable"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "build: normalize uv lock to public PyPI"
          git push origin HEAD:phase-5-release-agents
